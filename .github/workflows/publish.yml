name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run security audit
      run: npm audit --audit-level=moderate
    
    - name: Build package
      run: npm run build
    
    - name: Verify dist output
      run: |
        [ -f dist/jsonview.js ] || (echo "Missing dist/jsonview.js" && exit 1)
        [ -f dist/jsonview.umd.cjs ] || (echo "Missing dist/jsonview.umd.cjs" && exit 1)
        [ -f dist/jsonview.css ] || (echo "Missing dist/jsonview.css" && exit 1)
        echo "✓ All required dist files present"
    
    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH }}

