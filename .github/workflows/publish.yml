name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Lint code
        run: npm run lint || echo "No lint script configured"

      - name: Run tests
        run: npm run test

      - name: Build package
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -d dist ]; then
            echo "❌ dist directory not found"
            exit 1
          fi
          
          REQUIRED_FILES=("jsonview.js" "jsonview.umd.cjs" "jsonview.css")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "dist/$file" ]; then
              echo "❌ Missing dist/$file"
              exit 1
            fi
            echo "✓ Found dist/$file"
          done
          
          echo "✅ All required dist files present"

  publish-npm:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (pre-publish validation)
        run: npm run test

      - name: Build package
        run: npm run build

      - name: Verify dist output
        run: |
          REQUIRED_FILES=("jsonview.js" "jsonview.umd.cjs" "jsonview.css")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "dist/$file" ]; then
              echo "❌ Missing dist/$file"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: Publish to npm
        run: npm publish --provenance --access public
