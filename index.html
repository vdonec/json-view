<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>json-view example</title>
    <style>
      body {
        margin: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fcfcfd;
      }

      .demo {
        max-width: 840px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #475467;
      }

      .panel {
        margin-top: 16px;
        padding: 14px;
        border: 1px solid #e4e7ec;
        border-radius: 12px;
        background: #fff;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      button {
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        background: #fff;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #f9fafb;
      }

      #status {
        font-size: 13px;
        color: #667085;
      }

      #stats {
        font-size: 13px;
        color: #344054;
      }
    </style>
  </head>
  <body>
    <main class="demo">
      <h1>json-view example</h1>
      <p>Example data is loaded from <code>public/example2.json</code>.</p>

      <section class="panel">
        <div class="controls">
          <button id="btn-generate-large" type="button">Generate large JSON</button>
          <button id="btn-load-example" type="button">Load example2.json</button>
          <button id="btn-expand-all" type="button">Expand all</button>
          <button id="btn-collapse-all" type="button">Collapse all</button>
          <span id="status">Preparing demo...</span>
          <span id="stats">Visible: 0 | Hidden: 0 | Total: 0</span>
        </div>
        <div id="root"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
